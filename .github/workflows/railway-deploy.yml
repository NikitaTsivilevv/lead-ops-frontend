name: Deploy to Railway

# Auto-deploy the frontend to Railway on every push to main, without relying on
# the Railway GitHub App. Uses a project-scoped RAILWAY_TOKEN (repo secret) so
# `railway up` can deploy unattended. Mirrors the old Vercel auto-deploy-from-main.

on:
  push:
    branches: [main]

concurrency:
  group: railway-deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy
        run: railway up --service lead-ops-frontend --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
