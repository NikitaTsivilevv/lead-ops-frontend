name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --legacy-peer-deps: the project pins vite@8, which is newer than
      # @vitejs/plugin-react@4.7.0's peer range (vite <=7). This mirrors the
      # repo's local .npmrc (legacy-peer-deps=true), which CI does not load.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://lead-ops-api-h67zx.ondigitalocean.app
